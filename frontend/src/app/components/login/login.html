<div class="container mt-5">

  <div class="card p-4">

    <h2 class="mb-4">
      Login
    </h2>

    <input
      type="email"
      class="form-control mb-3"
      placeholder="Email"
      [(ngModel)]="email">

    <input
      type="password"
      class="form-control mb-3"
      placeholder="Password"
      [(ngModel)]="password">

    <button
      class="btn btn-primary w-100"
      (click)="login()">

      Login

    </button>

  </div>

</div>
