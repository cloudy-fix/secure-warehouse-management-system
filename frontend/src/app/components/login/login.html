<div class="login-container">

  <div class="login-card">

    <h1>Secure Warehouse System</h1>

    <p class="subtitle">
      Secure Product Tracking Platform
    </p>

    <form (ngSubmit)="login()">

      <div class="mb-3">

        <label>Email</label>

        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required>

      </div>

      <div class="mb-3">

        <label>Password</label>

        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required>

      </div>

      <button class="btn btn-dark w-100">

        Secure Login

      </button>

    </form>

    <div class="text-center mt-3">
      <a routerLink="/register" class="link-primary">
        Create a new account
      </a>
    </div>

    <div class="roles-section mt-4">

      <h5>System Roles</h5>

      <div class="role-card admin">
        ADMIN → Full Access
      </div>

      <div class="role-card seller">
        SELLER → Product Management
      </div>

      <div class="role-card buyer">
        BUYER → Orders & Tracking
      </div>

    </div>

  </div>

</div>
