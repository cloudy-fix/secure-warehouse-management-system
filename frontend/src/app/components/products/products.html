<div class="container mt-5">

  <div class="card p-4 mb-4">

    <h2>Add Product</h2>

    <input
      class="form-control mb-3"
      placeholder="Product Name"
      [(ngModel)]="name">

    <input
      class="form-control mb-3"
      placeholder="Category"
      [(ngModel)]="category">

    <input
      class="form-control mb-3"
      placeholder="Price"
      [(ngModel)]="price">

    <input
      class="form-control mb-3"
      placeholder="Quantity"
      [(ngModel)]="quantity">

    <button
      class="btn btn-success"
      (click)="addProduct()">

      Add Product

    </button>

  </div>

  <div class="card p-4">

    <h2>Products</h2>

    <table class="table table-bordered">

      <thead>

      <tr>

        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Quantity</th>

      </tr>

      </thead>

      <tbody>

      <tr *ngFor="let product of products">

        <td>{{product.id}}</td>
        <td>{{product.name}}</td>
        <td>{{product.category}}</td>
        <td>{{product.price}}</td>
        <td>{{product.quantity}}</td>

      </tr>

      </tbody>

    </table>

  </div>

</div>
