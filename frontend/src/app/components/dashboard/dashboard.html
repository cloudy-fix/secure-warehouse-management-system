<app-sidebar></app-sidebar>

<div class="container-fluid dashboard-content">

  <!-- HEADER -->

  <div class="mb-4">

    <h1>

      Secure Warehouse Dashboard

    </h1>

    <p class="text-muted">

      Enterprise Product Security System

    </p>

  </div>

  <!-- ROLE BADGE -->

  <div class="alert alert-info">

    Logged in as:

    <strong>{{ role }}</strong>

  </div>

  <!-- DASHBOARD CARDS -->

  <div class="row">

    <!-- PRODUCTS -->

    <div class="col-md-3">

      <div class="card dashboard-card products-card">

        <h2>150</h2>

        <p>Total Products</p>

      </div>

    </div>

    <!-- ORDERS -->

    <div class="col-md-3">

      <div class="card dashboard-card orders-card">

        <h2>45</h2>

        <p>Total Orders</p>

      </div>

    </div>

    <!-- WAREHOUSES -->

    <div class="col-md-3">

      <div class="card dashboard-card warehouse-card">

        <h2>12</h2>

        <p>Warehouses</p>

      </div>

    </div>

    <!-- SECURITY -->

    <div class="col-md-3">

      <div class="card dashboard-card security-card">

        <h2>99%</h2>

        <p>Security Status</p>

      </div>

    </div>

  </div>

  <!-- ADMIN SECTION -->

  <div

    *ngIf="role === 'ADMIN'"

    class="card p-4 mt-4 border-danger">

    <h3 class="text-danger">

      Admin Security Controls

    </h3>

    <p>

      Product masking and warehouse security active.

    </p>

  </div>

</div>
